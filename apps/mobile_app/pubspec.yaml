name: mobile_app
description: Mobile app for accounting system
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Design System
  design_system:
    path: ../../packages/design_system
  app_shell:
    path: ../../packages/app_shell

  # Core Packages
  foundation:
    path: ../../packages/foundation
  platform:
    path: ../../packages/platform

  # Feature Packages
  accounting:
    path: ../../packages/features/accounting
  journal:
    path: ../../packages/features/journal
  partners:
    path: ../../packages/features/partners
  sales:
    path: ../../packages/features/sales
  purchases:
    path: ../../packages/features/purchases
  payments:
    path: ../../packages/features/payments
  products:
    path: ../../packages/features/products
  inventory:
    path: ../../packages/features/inventory
  damages:
    path: ../../packages/features/damages
  production:
    path: ../../packages/features/production
  stock_count:
    path: ../../packages/features/stock_count
  reports:
    path: ../../packages/features/reports
  users:
    path: ../../packages/features/users
  settings:
    path: ../../packages/features/settings
  audit_log:
    path: ../../packages/features/audit_log

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.0.0

  # Localization
  easy_localization: ^3.0.3

  # Utils
  intl: ^0.20.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
