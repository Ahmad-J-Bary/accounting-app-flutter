name: storage
description: Local storage and database implementations
publish_to: none
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  # SQLite
  sqflite: ^2.3.0
  path: ^1.8.3

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Shared preferences
  shared_preferences: ^2.2.2

  # Hive for caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  shared:
    path: ../shared

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
