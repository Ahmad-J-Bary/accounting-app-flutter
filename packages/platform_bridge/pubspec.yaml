version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Plugins
  path_provider: ^2.1.1
  share_plus: ^7.2.1
